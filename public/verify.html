<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Verify Subscription</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="bw-header">
    <h1>Verifying…</h1>
  </header>

  <main class="bw-main">
    <section class="bw-card">
      <p id="verifyStatus">Checking your token…</p>
    </section>
  </main>

  <script type="module">
    async function verify() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const status = document.getElementById("verifyStatus");

      if (!token) {
        status.textContent = "Invalid verification link.";
        return;
      }

      // Trigger GitHub Action to verify subscriber
      const owner = "<YOUR_GITHUB_USERNAME>";
      const repo = "<YOUR_REPO_NAME>";
      const tokenGH = "<YOUR_GITHUB_PAT>";

      await fetch(`https://api.github.com/repos/${owner}/${repo}/dispatches`, {
        method: "POST",
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${tokenGH}`
        },
        body: JSON.stringify({
          event_type: "verify_subscriber",
          client_payload: { token }
        })
      });

      status.textContent = "Your email is verified!";
    }

    verify();
  </script>
</body>
</html>
